<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>超级计算器</title>
  <style>
    /* ------------------------------------------------
       预加载器 - WASM 加载完成前显示
    ------------------------------------------------ */
    .preloader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      transition: opacity 0.5s ease;
    }
    .preloader--hidden {
      opacity: 0;
      pointer-events: none;
    }
    .preloader__spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4f8cff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .preloader__title {
      margin-top: 24px;
      font-size: 1.2rem;
      font-weight: 500;
    }
    .preloader__sub {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #888;
    }
    .preloader__error {
      display: none;
      margin-top: 16px;
      padding: 12px 20px;
      background: rgba(239,83,80,0.15);
      border: 1px solid rgba(239,83,80,0.3);
      border-radius: 8px;
      color: #ef5350;
      font-size: 0.85rem;
      max-width: 320px;
      text-align: center;
    }
    .preloader__error--visible {
      display: block;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <div id="preloader" class="preloader">
    <div class="preloader__spinner"></div>
    <div class="preloader__title">超级计算器</div>
    <div class="preloader__sub" id="preloader-status">正在加载计算引擎...</div>
    <div class="preloader__error" id="preloader-error"></div>
  </div>

  <script>
    // 全局错误捕获 → 显示在预加载器上
    window.addEventListener('error', function(e) {
      var el = document.getElementById('preloader-error');
      var container = document.getElementById('preloader');
      if (!el) return;
      el.textContent = '加载失败: ' + (e.message || '未知错误');
      el.classList.add('preloader__error--visible');
      container.style.background = '#1a1a1a';
      document.getElementById('preloader-status').textContent = '请刷新页面重试';
    });

    // WASM 加载完成后隐藏预加载器
    window.__hidePreloader = function() {
      var el = document.getElementById('preloader');
      if (el) {
        el.classList.add('preloader--hidden');
        setTimeout(function() { el.remove(); }, 500);
      }
    };
    window.__showPreloaderError = function(msg) {
      var el = document.getElementById('preloader-error');
      if (el) {
        el.textContent = msg;
        el.classList.add('preloader__error--visible');
        document.getElementById('preloader-status').textContent = '加载失败';
      }
    };
  </script>
</body>
</html>
