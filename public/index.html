<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>超级计算器</title>
  <link rel="preload" as="fetch" href="/calc.wasm" crossorigin="anonymous" type="application/wasm">
  <style>
    .html-loader {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e; color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .html-loader__spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #4f8cff;
      border-radius: 50%;
      animation: html-loader-spin 0.8s linear infinite;
    }
    .html-loader__text { margin-top: 20px; font-size: 1.1rem; font-weight: 500; }
    @keyframes html-loader-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="html-loader" class="html-loader">
    <div class="html-loader__spinner"></div>
    <div class="html-loader__text">超级计算器</div>
  </div>
</body>
</html>
