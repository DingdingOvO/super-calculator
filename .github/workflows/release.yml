# ===========================================
# 自动发布工作流
# 打上 v* 标签时触发：
#   1. 构建生产包
#   2. 部署到 GitHub Pages
#   3. 自动生成 Changelog
#   4. 上传构建产物到 Release
# ===========================================
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Node Modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-release-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            node-release-${{ runner.os }}-

      - name: Install Node Dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-calculator/target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('rust-calculator/Cargo.toml') }}
          restore-keys: |
            cargo-release-${{ runner.os }}-

      - name: Build WASM
        run: cd rust-calculator && wasm-pack build --target bundler --release

      - name: Build Production Bundle
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configurationJson: |
            {
              "template": "# Changelog\n\n$UNCATEGORIZED\n",
              "categories": []
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            dist/
            LICENSE
